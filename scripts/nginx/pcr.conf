# PCR Momentum Trading Bot — reverse proxy for FastAPI gateway.
# Frontend lives on Vercel; this server only exposes the backend over HTTPS.

server {
    server_name 3-6-128-21.sslip.io;

    # Let LE renew without HTTPS forced redirect
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (push-only view stream)
    location /stream {
        proxy_pass http://127.0.0.1:8000/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Upstox webhook (no JWT; auth via client_id check inside the handler)
    location = /api/auth/upstox-webhook {
        proxy_pass http://127.0.0.1:8000/auth/upstox-webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plain root: a stub that confirms the host is alive
    location = / {
        return 200 "pcr-bot api gateway. see /api/health\n";
        add_header Content-Type text/plain;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/3-6-128-21.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/3-6-128-21.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = 3-6-128-21.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name 3-6-128-21.sslip.io;
    return 404; # managed by Certbot


}