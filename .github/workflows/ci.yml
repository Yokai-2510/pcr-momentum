name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend (lint + type + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: trader
          POSTGRES_DB: premium_diff_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Settings the test suite needs (see backend/tests/conftest.py + state/config_loader.py)
      DATABASE_URL: postgresql://trader:trader@localhost:5432/premium_diff_bot
      REDIS_URL: unix:///tmp/redis.sock
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      CREDS_ENCRYPTION_KEY: ${{ secrets.CREDS_ENCRYPTION_KEY || 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb' }}
      APP_ENV: prod
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy (strict on state/ + log_setup.py)
        run: mypy

      - name: Pytest
        run: pytest -ra
