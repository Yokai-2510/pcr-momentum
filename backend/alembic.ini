; Alembic configuration for Premium-Diff backend.
;
; DSN is sourced at runtime from the DATABASE_URL env var inside `alembic/env.py`,
; not from this file. The `sqlalchemy.url` line is kept blank intentionally.
;
; Run from `backend/`:
;   alembic upgrade head
;   alembic revision -m "..."

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

; Python path resolution — use the project's Python (venv) directly.
; Filenames are timestamped only when running `alembic revision`; numeric
; prefixes (0001, 0002, ...) are kept manually for review readability.

[post_write_hooks]

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
